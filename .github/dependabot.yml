version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-tooling:
        patterns:
          - '@vitejs/*'
          - vite
          - vitest
          - typescript
          - eslint
          - 'typescript-eslint'
      browser-testing:
        patterns:
          - '@playwright/*'
          - '@axe-core/*'
